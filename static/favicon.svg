<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#002366;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CCA900;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg-grad)" />

  <!-- SchoolCBT "S" layers icon (stylized stack/layers) -->
  <!-- Top layer -->
  <path d="M12 18 L32 10 L52 18 L32 26 Z" fill="url(#gold-grad)" opacity="0.9"/>
  <!-- Middle layer -->
  <path d="M12 30 L32 22 L52 30 L32 38 Z" fill="#50C878" opacity="0.85"/>
  <!-- Bottom layer -->
  <path d="M12 42 L32 34 L52 42 L32 50 Z" fill="url(#gold-grad)" opacity="0.7"/>

  <!-- Connecting verticals (left) -->
  <line x1="12" y1="18" x2="12" y2="42" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <!-- Connecting verticals (right) -->
  <line x1="52" y1="18" x2="52" y2="42" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
</svg>
