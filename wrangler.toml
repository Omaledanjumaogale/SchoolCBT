name = "schoolcbt"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".svelte-kit/cloudflare"

[vars]
PUBLIC_APP_NAME = "SchoolCBT"
PUBLIC_APP_URL = "https://schoolcbt.ewinproject.org"

# KV Namespaces (uncomment and add IDs when created)
# [[kv_namespaces]]
# binding = "SESSIONS"
# id = "YOUR_KV_NAMESPACE_ID"

# D1 Database (uncomment when created)
# [[d1_databases]]
# binding = "DB"
# database_name = "schoolcbt"
# database_id = "YOUR_D1_DATABASE_ID"

# R2 Bucket (uncomment when created)
# [[r2_buckets]]
# binding = "UPLOADS"
# bucket_name = "schoolcbt-uploads"
